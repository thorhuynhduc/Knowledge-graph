# ===================================================================
#  Production stack khi dùng NGINX TRÊN HOST (giống convention dự án Course-online).
#  Chỉ chạy app + MySQL bằng Docker; app bind 127.0.0.1 -> Nginx host proxy vào.
#  SSL: Certbot chạy bằng Docker (xem deploy/certbot/), Nginx do host quản lý.
#
#    docker compose -f docker-compose.nginx.yml up -d --build
# ===================================================================
services:

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Bắt buộc đặt trong .env}
      MYSQL_DATABASE: ${DB_NAME:-knowledge_graph}
      MYSQL_USER: ${DB_USER:-kguser}
      MYSQL_PASSWORD: ${DB_PASS:?Bắt buộc đặt trong .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-kguser}
      DB_PASS: ${DB_PASS:?Bắt buộc đặt trong .env}
      DB_NAME: ${DB_NAME:-knowledge_graph}
      PORT: 3000
      API_TOKEN: ${API_TOKEN:-}
      AUTH_USER: ${AUTH_USER:?Bắt buộc đặt trong .env}
      AUTH_PASS: ${AUTH_PASS:?Bắt buộc đặt trong .env}
      SESSION_SECRET: ${SESSION_SECRET:?Bắt buộc đặt trong .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    # CHỈ localhost -> Nginx host proxy vào (không phơi ra Internet).
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - ./public:/app/public:ro     # sửa frontend xong chỉ cần F5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
