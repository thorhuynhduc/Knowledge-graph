# Knowledge Graph 3D — hvnk.tech
# Nginx host reverse proxy -> app Docker tại 127.0.0.1:3000
#
# Cài đặt (sau khi đã có cert):
#   cp deploy/nginx/hvnk.tech.conf /etc/nginx/sites-available/hvnk.tech.conf
#   ln -sf /etc/nginx/sites-available/hvnk.tech.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# Hỗ trợ nâng cấp websocket (an toàn dù app hiện chưa dùng WS).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP: ACME challenge + chuyển hướng sang HTTPS (gộp www -> non-www) ---
server {
    listen 80;
    listen [::]:80;
    server_name hvnk.tech www.hvnk.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://hvnk.tech$request_uri;
    }
}

# --- HTTPS www -> non-www ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hvnk.tech;

    ssl_certificate /etc/letsencrypt/live/hvnk.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvnk.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    return 301 https://hvnk.tech$request_uri;
}

# --- HTTPS chính: reverse proxy vào app ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hvnk.tech;

    ssl_certificate /etc/letsencrypt/live/hvnk.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvnk.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Khớp limit JSON 5mb của app (import dữ liệu lớn)
    client_max_body_size 6m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_vary on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # để app đặt cookie Secure + lấy đúng IP

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
