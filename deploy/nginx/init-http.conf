# Nginx config TẠM THỜI — chỉ dùng trong lần cấp SSL đầu tiên.
# Sau khi có cert, gỡ file này và dùng SSL config thật (hvnk.tech.conf).
#
# Cài đặt:
#   cp deploy/nginx/init-http.conf /etc/nginx/sites-available/init-http.conf
#   ln -sf /etc/nginx/sites-available/init-http.conf /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#
# Gỡ sau khi có cert:
#   rm /etc/nginx/sites-enabled/init-http.conf /etc/nginx/sites-available/init-http.conf

server {
    listen 80;
    listen [::]:80;
    server_name hvnk.tech www.hvnk.tech;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Deploying...\n';
        add_header Content-Type text/plain;
    }
}
